# List of GitHub repos as `org/name` (same format for `generate_summary --repos` and `sync_repos.py`).
#
# The lines under `repos:` must be real repos you can access, or clones/sync will fail with
# "Repository not found".
#
# Suggested workflow: copy this file to `repos.local.yaml` (gitignored), then edit:
#   cp examples/repos.yaml repos.local.yaml
#   python scripts/sync_repos.py --repos-file repos.local.yaml --root ~/src
#
# Example entries (uncomment and fix org/repo):
#   - FloQastInc/close
#   - FloQastInc/other-service

repos: []
